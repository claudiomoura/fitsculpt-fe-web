<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FitSculpt</title>
    <meta http-equiv="refresh" content="0; url=./" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #ffffff;
        color: #0f172a;
      }

      .shell-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .shell-loader img {
        width: 72px;
        height: 72px;
      }

      .shell-loader p {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="shell-loader">
      <img src="./fitsculpt-logo-transparent.png" alt="FitSculpt" width="72" height="72" />
      <p>Loading FitSculpt...</p>
    </div>
  </body>
</html>
