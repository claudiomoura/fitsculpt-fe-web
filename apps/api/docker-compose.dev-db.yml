services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fitsculpt
      POSTGRES_PASSWORD: fitsculpt
      POSTGRES_DB: fitsculpt
    ports:
      - "5432:5432"
    volumes:
      - fitsculpt_api_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitsculpt -d fitsculpt"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  fitsculpt_api_dev_data:
